<div class="cards">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Admin</mat-card-title>
      <mat-card-subtitle>Manage accounts and settings for this location</mat-card-subtitle>
    </mat-card-header>
    <mat-card-actions>
      <a mat-flat-button color="primary" [routerLink]="['/', locationCode, 'admin']">Continue</a>
    </mat-card-actions>
  </mat-card>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Employee</mat-card-title>
      <mat-card-subtitle>Clock in and out for your shift</mat-card-subtitle>
    </mat-card-header>
    <mat-card-actions>
      <a mat-flat-button color="primary" [routerLink]="['/', locationCode, 'employee']">Continue</a>
    </mat-card-actions>
  </mat-card>
</div>
