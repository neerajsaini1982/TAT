<h2 mat-dialog-title>Edit Punch Times — {{ data.employeeName }}</h2>
<mat-dialog-content class="content">
  <div class="time-grid">
    <mat-form-field appearance="outline">
      <mat-label>Clock In</mat-label>
      <input matInput type="time" [(ngModel)]="clockInAt" required />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Clock Out</mat-label>
      <input matInput type="time" [(ngModel)]="clockOutAt" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Break Start</mat-label>
      <input matInput type="time" [(ngModel)]="breakStartAt" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Break End</mat-label>
      <input matInput type="time" [(ngModel)]="breakEndAt" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Lunch Start</mat-label>
      <input matInput type="time" [(ngModel)]="lunchStartAt" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Lunch End</mat-label>
      <input matInput type="time" [(ngModel)]="lunchEndAt" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>2nd Break Start</mat-label>
      <input matInput type="time" [(ngModel)]="break2StartAt" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>2nd Break End</mat-label>
      <input matInput type="time" [(ngModel)]="break2EndAt" />
    </mat-form-field>
  </div>
  <mat-form-field appearance="outline" class="note-field">
    <mat-label>Reason for this edit</mat-label>
    <textarea matInput rows="2" [(ngModel)]="note"></textarea>
  </mat-form-field>
  @if (error) {
    <p class="error">{{ error }}</p>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
