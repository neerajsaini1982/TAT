@if (!isSignedIn) {
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Employee Clock In</mat-card-title>
      <mat-card-subtitle>Location: {{ locationCode }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="login()" class="form">
        <mat-form-field appearance="outline">
          <mat-label>6-Digit Code</mat-label>
          <input matInput name="userCode" [(ngModel)]="userCode" maxlength="6" required />
        </mat-form-field>
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }
        <button mat-flat-button color="primary" type="submit" [disabled]="loading()">Continue</button>
      </form>
    </mat-card-content>
  </mat-card>
} @else {
  <mat-card>
    <mat-card-header>
      <mat-card-title>Welcome, {{ auth.session()?.firstName }}</mat-card-title>
      <mat-card-subtitle>{{ locationCode }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <button mat-flat-button color="primary">Clock In</button>
      <a mat-flat-button color="primary" [routerLink]="['/', locationCode, 'employee', 'availability']">My Availability</a>
      <a mat-stroked-button [routerLink]="['/', locationCode, 'employee', 'availability2']">Calendar View</a>
      <button mat-stroked-button (click)="logout()">Log Out</button>
    </mat-card-content>
  </mat-card>
}
